<h2>Create New Bill</h2>

<div class="card">
  <div class="card-body">
    <form (ngSubmit)="saveBill()">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="customer" class="form-label">Customer *</label>
          <select class="form-select" id="customer" [(ngModel)]="billRequest.customerId" name="customer" required>
            <option value="">Select Customer</option>
            <option *ngFor="let customer of customers" [value]="customer.id">
              {{ customer.name }} - {{ customer.phone }}
            </option>
          </select>
        </div>

        <div class="col-md-3 mb-3">
          <label for="billDate" class="form-label">Bill Date *</label>
          <input type="date" class="form-control" id="billDate" [(ngModel)]="billRequest.billDate" name="billDate" required>
        </div>

        <div class="col-md-3 mb-3">
          <div class="form-check mt-4">
            <input class="form-check-input" type="checkbox" id="isInterState" [(ngModel)]="billRequest.isInterState" name="isInterState">
            <label class="form-check-label" for="isInterState">
              Inter-State (IGST)
            </label>
          </div>
        </div>
      </div>

      <hr>

      <h5>Add Items</h5>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label for="product" class="form-label">Product *</label>
          <select class="form-select" id="product" [(ngModel)]="newItem.productId" name="product" (ngModelChange)="onProductChange()">
            <option [ngValue]="null">Select Product</option>
            <option *ngFor="let product of products" [ngValue]="product.id">
              {{ product.name }} - ₹{{ product.price }}/{{ product.unit }}
            </option>
          </select>
        </div>

        <div class="col-md-2 mb-3">
          <label for="quantity" class="form-label">Quantity *</label>
          <input type="number" class="form-control" id="quantity" [(ngModel)]="newItem.quantity" name="quantity" min="0.01" step="0.01" >
        </div>

        <div class="col-md-2 mb-3">
          <label for="unitPrice" class="form-label">Unit Price</label>
          <input type="number" class="form-control" id="unitPrice" [(ngModel)]="newItem.unitPrice" name="unitPrice" readonly>
        </div>

        <div class="col-md-2 mb-3">
          <label for="gstRate" class="form-label">GST Rate</label>
          <input type="number" class="form-control" id="gstRate" [(ngModel)]="newItem.gstRate" name="gstRate" readonly>
        </div>

        <div class="col-md-2 mb-3">
          <label class="form-label">Item Total</label>
          <input type="text" class="form-control" value="₹{{ newItemTotalWithGST | number:'1.2-2' }}" readonly>
        </div>

        <div class="col-md-1 mb-3">
          <label class="form-label">&nbsp;</label>
          <button type="button" class="btn btn-success d-block w-100" (click)="addItem()">Add</button>
        </div>
      </div>

      <div class="table-responsive" *ngIf="billRequest.items.length > 0">
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>Product</th>
              <th>Quantity</th>
              <th>Unit Price</th>
              <th>GST Rate</th>
              <th>Total</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of billRequest.items; let i = index">
              <td>{{ getProductName(item.productId) }}</td>
              <td>{{ item.quantity }}</td>
              <td>₹{{ item.unitPrice }}</td>
              <td>{{ item.gstRate }}%</td>
              <td>₹{{ calculateItemTotal(item) | number:'1.2-2' }}</td>
              <td>
                <button type="button" class="btn btn-sm btn-danger" (click)="removeItem(i)">Remove</button>
              </td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="4" class="text-end"><strong>Total:</strong></td>
              <td colspan="2"><strong>₹{{ calculateTotal() | number:'1.2-2' }}</strong></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <div class="mt-3">
        <button type="submit" class="btn btn-primary" [disabled]="loading || billRequest.items.length === 0">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Creating...' : 'Create Bill' }}
        </button>
        <button type="button" class="btn btn-secondary ms-2" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
