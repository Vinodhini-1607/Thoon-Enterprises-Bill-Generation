<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>Products</h2>
  <button class="btn btn-primary" routerLink="/products/new">Add Product</button>
</div>

<div class="mb-3">
  <input type="text" class="form-control" placeholder="Search products..." [(ngModel)]="searchKeyword" (input)="searchProducts()">
</div>

<div class="loading-spinner" *ngIf="loading">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<div class="table-responsive" *ngIf="!loading">
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Name</th>
        <th>Unit</th>
        <th>Price</th>
        <th>GST Rate</th>
        <th>HSN Code</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td>{{ product.name }}</td>
        <td>{{ product.unit }}</td>
        <td>₹{{ product.price }}</td>
        <td>{{ product.gstRate }}%</td>
        <td>{{ product.hsnCode || '-' }}</td>
        <td>
          <button class="btn btn-sm btn-info me-2" routerLink="/products/edit/{{product.id}}">Edit</button>
          <button class="btn btn-sm btn-danger" (click)="deleteProduct(product.id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
